---
# Legacy reference file.
# Monitoring now runs from `docker-compose.production.yml` as part of the
# unified `overwatch-tournaments` production stack.
#
# Keep this file only as a migration/reference snapshot until it is safe to
# remove completely.

networks:
  app-network:
    external: true
    name: anak-tournaments_app-network

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:

services:
  # --------------------------------------------------------------------------
  # Prometheus — metrics collection and alerting rules
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network
    depends_on:
      - redis-exporter
      - rabbitmq-exporter

  # --------------------------------------------------------------------------
  # Alertmanager — routes alerts to Discord
  # --------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./secrets:/run/secrets:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Redis exporter — exposes Redis metrics for Prometheus
  # --------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
    ports:
      - "9121:9121"
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # RabbitMQ exporter — exposes queue metrics for Prometheus
  # --------------------------------------------------------------------------
  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:1.0.0-RC19
    container_name: rabbitmq-exporter
    restart: unless-stopped
    environment:
      RABBIT_URL: "http://rabbitmq:15672"
      RABBIT_USER: "${RABBITMQ_USER:-guest}"
      RABBIT_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      RABBIT_CAPABILITIES: "bert,no_sort"
      PUBLISH_PORT: "9419"
      OUTPUT_FORMAT: "TTY"
      SKIP_QUEUES: "^$"
      INCLUDE_QUEUES: ".*"
    ports:
      - "9419:9419"
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Loki — log aggregation backend
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - app-network

  # --------------------------------------------------------------------------
  # Promtail — ships log files from the host into Loki
  # --------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      # Mount the host logs directory (one level up from monitoring/)
      - ../logs:/var/log/app:ro
    networks:
      - app-network
    depends_on:
      - loki

  # --------------------------------------------------------------------------
  # Grafana — unified dashboards for metrics and logs
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3001}"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - app-network
    depends_on:
      - prometheus
      - loki
