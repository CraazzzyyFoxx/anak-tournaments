_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://auth:8001/auth
    routes:
      - name: auth-api
        paths:
          - /api/auth
        strip_path: true
        preserve_host: true

  - name: parser
    url: http://parser:8002
    routes:
      - name: parser-api
        paths:
          - /api/parser
        strip_path: true
        preserve_host: true

  - name: balancer
    url: http://balancer:8003
    routes:
      - name: balancer-api
        paths:
          - /api/balancer
        strip_path: true
        preserve_host: true

  - name: backend
    url: http://backend:8000
    routes:
      - name: backend-api
        paths:
          - /api
        strip_path: false
        preserve_host: true

  # Frontend is present in production compose; in dev it's often disabled.
  # The route is still safe to keep: Kong will return 502 if frontend isn't running.
  - name: frontend
    url: http://frontend:3000
    routes:
      - name: frontend-web
        paths:
          - /
        strip_path: false
        preserve_host: true
