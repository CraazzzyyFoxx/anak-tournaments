  balancer:
    image: registry.craazzzyyfoxx.me/aqt-balancer:latest
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --workers ${WORKERS_BALANCER} --loop uvloop
    env_file:
      - ./backend/env/common.env
      - ./backend/env/balancer.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./logs/balancer:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  balancer-worker:
    image: registry.craazzzyyfoxx.me/aqt-balancer:latest
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: faststream run serve:app
    env_file:
      - ./backend/env/common.env
      - ./backend/env/balancer.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      balancer:
        condition: service_healthy
    volumes:
      - ./logs/balancer-worker:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  frontend:
    image: registry.craazzzyyfoxx.me/frontend:latest
    build:
      context: ./frontend
      dockerfile: prod.Dockerfile
      args:
        NEXT_API_URL: ${NEXT_API_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BALANCER_API_URL: ${NEXT_PUBLIC_BALANCER_API_URL}
        NEXT_PUBLIC_AUTH_SERVICE_URL: ${NEXT_PUBLIC_AUTH_SERVICE_URL}
        NEXT_PUBLIC_CACHE_POLICY: ${NEXT_PUBLIC_CACHE_POLICY}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SITE_ICON: ${NEXT_PUBLIC_SITE_ICON}
        NEXT_PUBLIC_SITE_FAVICON: ${NEXT_PUBLIC_SITE_FAVICON}
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_AUTH_SERVICE_URL=${NEXT_PUBLIC_AUTH_SERVICE_URL}
      - NEXT_PUBLIC_BALANCER_API_URL=${NEXT_PUBLIC_BALANCER_API_URL}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_CACHE_POLICY=${NEXT_PUBLIC_CACHE_POLICY}
      - NEXT_API_URL=${NEXT_API_URL}
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
    volumes:
      - ./logs/frontend:/logs
      # Optional: override the browser favicon at runtime
      # - ./conf/favicon.ico:/app/public/favicon.ico:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always

volumes:
  redis-data:
  rabbitmq-data:

networks:
  app-network:
    driver: bridge
