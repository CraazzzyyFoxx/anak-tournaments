services:
  redis:
    container_name: aqt-redis
    image: 'redis/redis-stack:latest'
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network

  nginx:
    container_name: aqt-nginx
    image: nginx:latest
    ports:
      - "${APP_PORT}:80"
    restart: always
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - parser
    networks:
      - app-network

  backend:
    image: "registry.craazzzyyfoxx.me/aqt-backend:latest"
    container_name: aqt-backend
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop
    volumes:
      - ./logs/backend:/logs
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL}
      - CLERK_ISSUER=${CLERK_ISSUER}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - app-network

  parser:
    image: registry.craazzzyyfoxx.me/aqt-parser:latest
    container_name: aqt-parser
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: uvicorn main:app --host 0.0.0.0 --port 8081 --loop uvloop
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SUPERUSER_EMAIL=${SUPERUSER_EMAIL}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - CHALLONGE_API_KEY=${CHALLONGE_API_KEY}
      - CHALLONGE_USERNAME=${CHALLONGE_USERNAME}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/parser:/logs
    depends_on:
      - redis
    networks:
      - app-network

  discord:
    image: registry.craazzzyyfoxx.me/aqt-discord:latest
    container_name: aqt-discord
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: python main.py
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - API_URL=${API_URL}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
    depends_on:
      - redis
    volumes:
      - ./logs/discord:/logs
    networks:
      - app-network

  frontend:
    image: registry.craazzzyyfoxx.me/frontend:latest
    container_name: aqt-frontend
    build:
      context: ./frontend
      dockerfile: prod.Dockerfile
      args:
        NEXT_API_URL: ${NEXT_API_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
        NEXT_PUBLIC_CACHE_POLICY: ${NEXT_PUBLIC_CACHE_POLICY}
    depends_on:
      - backend
    volumes:
      - ./logs/frontend:/logs
    networks:
      - app-network

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge
