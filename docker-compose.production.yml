services:
  redis:
    image: 'redis/redis-stack:latest'
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  kong:
    image: kong:3.7
    restart: always
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=off
      - KONG_ADMIN_GUI_LISTEN=off
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      - KONG_LOG_LEVEL=${KONG_LOG_LEVEL:-notice}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      balancer:
        condition: service_healthy
#      frontend:
#        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    image: "registry.craazzzyyfoxx.me/aqt-backend:latest"
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${WORKERS_BACKEND} --loop uvloop
    volumes:
      - ./logs/backend:/logs
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8000
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - RABBITMQ_URL=${RABBITMQ_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
  auth:
    image: registry.craazzzyyfoxx.me/aqt-auth:latest
    build:
      context: ./backend
      args:
        APP_PATH: auth
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers ${WORKERS_AUTH} --loop uvloop
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8001
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/auth:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  parser:
    image: registry.craazzzyyfoxx.me/aqt-parser:latest
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --workers ${WORKERS_PARSER} --loop uvloop
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8002
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - CHALLONGE_API_KEY=${CHALLONGE_API_KEY}
      - CHALLONGE_USERNAME=${CHALLONGE_USERNAME}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
      - PROXY_IP=${PROXY_IP}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - SERVICE_USER_ID=${SERVICE_USER_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/parser:/logs
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  discord:
    image: registry.craazzzyyfoxx.me/aqt-discord:latest
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: python main.py
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - PARSER_URL=${PARSER_URL}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
      - PROXY_IP=${PROXY_IP}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      parser:
        condition: service_healthy
    volumes:
      - ./logs/discord:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

