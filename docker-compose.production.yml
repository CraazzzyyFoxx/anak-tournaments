services:
  redis:
    image: 'redis/redis-stack:latest'
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app-network

  kong:
    image: kong:3.7
    restart: always
    environment:
      - KONG_DATABASE=off
      - KONG_MEM_CACHE_SIZE=64m
      - KONG_NGINX_WORKER_PROCESSES=2
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=off
      - KONG_ADMIN_GUI_LISTEN=off
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      - KONG_DNS_STALE_TTL=0
      - KONG_DNS_NOT_FOUND_TTL=1
      - KONG_DNS_ERROR_TTL=1
      - KONG_LOG_LEVEL=${KONG_LOG_LEVEL:-notice}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      balancer:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    image: "registry.craazzzyyfoxx.me/aqt-backend:latest"
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${WORKERS_BACKEND} --loop uvloop
    volumes:
      - ./logs/backend:/logs
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  auth:
    image: registry.craazzzyyfoxx.me/aqt-auth:latest
    build:
      context: ./backend
      args:
        APP_PATH: auth
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers ${WORKERS_AUTH}
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/auth:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  parser:
    image: registry.craazzzyyfoxx.me/aqt-parser:latest
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --workers ${WORKERS_PARSER} --loop uvloop
    env_file:
      - ./backend/env/common.env
      - ./backend/env/parser.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/parser:/logs
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/parser/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

  discord:
    image: registry.craazzzyyfoxx.me/aqt-discord:latest
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: python main.py
    env_file:
      - ./backend/env/common.env
      - ./backend/env/discord.env
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      parser:
        condition: service_healthy
    volumes:
      - ./logs/discord:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

