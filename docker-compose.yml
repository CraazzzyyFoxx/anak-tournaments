services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-aqt_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aqt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: registry.craazzzyyfoxx.me/aqt-backend:dev
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop uvloop --reload --reload-dir /app/app-service --reload-dir /app/shared
    ports:
      - "8000:8000"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/app.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/pyproject.toml
          action: rebuild
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app-service:/app/app-service
      - ./backend/shared:/app/shared
      - ./logs/backend:/logs
      - ./backend/htmlcov:/app/htmlcov
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth:
    image: registry.craazzzyyfoxx.me/aqt-auth:dev
    build:
      context: ./backend
      args:
        APP_PATH: auth
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --loop uvloop --reload --reload-dir /app/auth-service --reload-dir /app/shared
    ports:
      - "8001:8001"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/auth.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - 'SERVICE_CLIENTS=${SERVICE_CLIENTS:-{"discord-service":"dev-discord-service-secret"}}'
      - 'SERVICE_SCOPES=${SERVICE_SCOPES:-{"discord-service":["parser:logs"]}}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      - ./backend/auth-service:/app/auth-service
      - ./backend/shared:/app/shared
      - ./logs/auth:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  parser:
    image: registry.craazzzyyfoxx.me/aqt-parser:dev
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --loop uvloop --reload --reload-dir /app/parser-service --reload-dir /app/shared
    ports:
      - "8002:8002"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/parser.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      - ./backend/parser-service:/app/parser-service
      - ./backend/shared:/app/shared
      - ./logs/parser:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/parser/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  balancer:
    image: registry.craazzzyyfoxx.me/aqt-balancer:dev
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --loop uvloop --reload --reload-dir /app/balancer-service --reload-dir /app/shared
    ports:
      - "8003:8003"
    env_file:
      - ./backend/env/common.env
      - ./backend/env/balancer.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend/balancer-service:/app/balancer-service
      - ./backend/shared:/app/shared
      - ./logs/balancer:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  balancer-worker:
    image: registry.craazzzyyfoxx.me/aqt-balancer:dev
    profiles: ["workers"]
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: faststream run serve:app --reload --reload-dir /app/balancer-service --reload-dir /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/balancer.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      balancer:
        condition: service_healthy
    volumes:
      - ./backend/balancer-service:/app/balancer-service
      - ./backend/shared:/app/shared
      - ./logs/balancer-worker:/logs
    networks:
      - app-network

  discord:
    image: registry.craazzzyyfoxx.me/aqt-discord:dev
    profiles: ["workers"]
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: watchfiles --filter python "python main.py" /app/discord-service /app/shared
    env_file:
      - ./backend/env/common.env
      - ./backend/env/discord.env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - SERVICE_CLIENT_ID=${DISCORD_SERVICE_CLIENT_ID:-discord-service}
      - SERVICE_CLIENT_SECRET=${DISCORD_SERVICE_CLIENT_SECRET:-dev-discord-service-secret}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      parser:
        condition: service_healthy
    volumes:
      - ./backend/discord-service:/app/discord-service
      - ./backend/shared:/app/shared
      - ./logs/discord:/logs
    networks:
      - app-network

  frontend:
    image: registry.craazzzyyfoxx.me/frontend:dev
    build:
      context: ./frontend
      dockerfile: dev.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-true}
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-true}
      - CHOKIDAR_INTERVAL=${CHOKIDAR_INTERVAL:-1000}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_AUTH_SERVICE_URL=${NEXT_PUBLIC_AUTH_SERVICE_URL}
      - NEXT_PUBLIC_BALANCER_API_URL=${NEXT_PUBLIC_BALANCER_API_URL}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME}
      - NEXT_PUBLIC_CACHE_POLICY=${NEXT_PUBLIC_CACHE_POLICY}
      - NEXT_API_URL=${NEXT_API_URL}
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      balancer:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-next:/app/.next
      - ./logs/frontend:/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  kong:
    image: kong:3.7
    profiles: ["gateway"]
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      - KONG_LOG_LEVEL=${KONG_LOG_LEVEL:-notice}
    ports:
      - "${APP_PORT}:8000"
      - "${KONG_ADMIN_PORT:-8005}:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
      parser:
        condition: service_healthy
      balancer:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  frontend-node-modules:
  frontend-next:

networks:
  app-network:
    driver: bridge
