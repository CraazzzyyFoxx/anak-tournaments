services:
  redis:
    image: 'redis:latest'
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network

  kong:
    image: kong:3.7
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:8000
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_STATUS_LISTEN=0.0.0.0:8100
      - KONG_LOG_LEVEL=${KONG_LOG_LEVEL:-notice}
    ports:
      - "${APP_PORT}:8000"
      - "${KONG_ADMIN_PORT:-8005}:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_started
      parser:
        condition: service_started
      balancer:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    image: "registry.craazzzyyfoxx.me/aqt-backend:latest"
    build:
      context: ./backend
      args:
        APP_PATH: app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --loop uvloop
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8000
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - RABBITMQ_URL=${RABBITMQ_URL}
    develop:
      watch:
        - path: ./backend/app-service
          action: sync
          target: /app
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/backend:/logs
      - ./backend/htmlcov:/app/htmlcov
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth:
    image: registry.craazzzyyfoxx.me/aqt-auth:latest
    build:
      context: ./backend
      args:
        APP_PATH: auth
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --loop uvloop
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8001
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
    develop:
      watch:
        - path: ./backend/auth-service
          action: sync
          target: /app
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      - ./logs/auth:/logs
    networks:
      - app-network

  parser:
    image: registry.craazzzyyfoxx.me/aqt-parser:latest
    build:
      context: ./backend
      args:
        APP_PATH: parser
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --loop uvloop
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8002
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - CHALLONGE_API_KEY=${CHALLONGE_API_KEY}
      - CHALLONGE_USERNAME=${CHALLONGE_USERNAME}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
      - PROXY_IP=${PROXY_IP}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
    develop:
      watch:
        - path: ./backend/parser-service
          action: sync
          target: /app
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      - ./logs/parser:/logs
    networks:
      - app-network

  discord:
    image: registry.craazzzyyfoxx.me/aqt-discord:latest
    build:
      context: ./backend
      args:
        APP_PATH: discord
    command: python main.py
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - PARSER_URL=${PARSER_URL}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
      - PROXY_IP=${PROXY_IP}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    volumes:
      - ./logs/discord:/logs
    networks:
      - app-network

  balancer:
    image: registry.craazzzyyfoxx.me/aqt-balancer:latest
    build:
      context: ./backend
      args:
        APP_PATH: balancer
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --loop uvloop
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=8003
      - PROJECT_URL=${PROJECT_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - ACCESS_TOKEN_SERVICE=${ACCESS_TOKEN_SERVICE}
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./logs/balancer:/logs
    networks:
      - app-network

